# Reverse proxy example for hosted deployment.
# Keep request body logging disabled and apply edge rate limiting.

limit_req_zone $binary_remote_addr zone=ara_plan_limit:10m rate=2r/s;

server {
    listen 80;
    server_name example.com;

    access_log /var/log/nginx/account-recovery-access.log combined;
    error_log /var/log/nginx/account-recovery-error.log warn;

    client_max_body_size 64k;

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
    }

    location / {
        limit_req zone=ara_plan_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
