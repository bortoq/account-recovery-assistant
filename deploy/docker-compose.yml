services:
  account-recovery-assistant:
    build: ..
    image: account-recovery-assistant:alpha
    ports:
      - "8000:8000"
    environment:
      ARA_RATE_LIMIT_MAX_REQUESTS: "120"
      ARA_RATE_LIMIT_WINDOW_SECONDS: "60"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
