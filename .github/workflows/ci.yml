name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build pytest setuptools
      - name: Run tests
        run: PYTHONPATH=src python -m pytest -v
      - name: Check data source
        run: python scripts/check_data_source.py
      - name: Validate data
        run: python scripts/validate_data.py
      - name: Install Playwright browsers
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium
      - name: Browser E2E smoke test
        run: PYTHONPATH=src python -m pytest tests/test_browser_smoke.py -q
      - name: Build Docker image
        run: docker build -t account-recovery-assistant:ci .
      - name: Docker health smoke test
        run: |
          docker run --rm -d --name ara-ci -p 8000:8000 account-recovery-assistant:ci
          for i in {1..20}; do
            python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()" && break
            sleep 1
          done
          docker logs ara-ci
          docker stop ara-ci
      - name: Build package
        run: python -m build --no-isolation
      - name: Wheel smoke test
        run: |
          python -m pip install --no-deps --force-reinstall dist/*.whl --target /tmp/ara-wheel
          PYTHONPATH=/tmp/ara-wheel python -c "from account_recovery_assistant import generate_recovery_plan; plan = generate_recovery_plan({'service': 'Google', 'lost_factor': 'authenticator_app', 'role': 'owner'}); assert plan['allowed'] is True"
      - name: Console script smoke test
        run: |
          python -m pip install --no-deps --force-reinstall dist/*.whl --target /tmp/ara-wheel-bin
          ln -sf /tmp/ara-wheel-bin/bin/account-recovery-assistant /usr/local/bin/account-recovery-assistant 2>/dev/null || true
          PYTHONPATH=/tmp/ara-wheel-bin python -m account_recovery_assistant --help 2>&1 | grep -q "serve-web"
