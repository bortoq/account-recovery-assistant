name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check official knowledge-base links
        run: python scripts/check_links.py
