name: Release Candidate

on:
  workflow_dispatch:

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tools
        run: python -m pip install --upgrade pip build pytest setuptools
      - name: Run public alpha checklist commands
        run: |
          python scripts/check_data_source.py
          python scripts/validate_data.py
          PYTHONPATH=src python -m pytest -q
      - name: Build Docker image
        run: docker build -t account-recovery-assistant:rc .
      - name: Build package artifacts
        run: python -m build --no-isolation
      - name: Installed console script smoke test
        run: |
          python -m pip install --no-deps --force-reinstall dist/*.whl --target /tmp/ara-rc
          PYTHONPATH=/tmp/ara-rc /tmp/ara-rc/bin/account-recovery-assistant examples/lost_mfa.json
      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: account-recovery-assistant-v0.1.0-rc.1
          path: |
            dist/*
            PUBLIC_ALPHA_CHECKLIST.md
            docs/release-candidate-v0.1.0-rc.1.md
            docs/public-alpha-status.md
            docs/deployment.md
